<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손으로 말해요! 🤟</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body class="home-page">

  <!-- Soft background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <div class="hero-floats" aria-hidden="true">
      <span class="fe" style="--x:8%;  --y:18%; --d:0.0s; --dur:3.2s">🌟</span>
      <span class="fe" style="--x:88%; --y:12%; --d:0.6s; --dur:2.8s">🌈</span>
      <span class="fe" style="--x:5%;  --y:72%; --d:1.2s; --dur:3.5s">💫</span>
      <span class="fe" style="--x:92%; --y:68%; --d:0.3s; --dur:3.0s">✨</span>
      <span class="fe" style="--x:48%; --y:4%;  --d:0.9s; --dur:2.6s">⭐</span>
      <span class="fe" style="--x:20%; --y:85%; --d:1.5s; --dur:3.8s">🎈</span>
      <span class="fe" style="--x:75%; --y:80%; --d:0.4s; --dur:3.3s">🎀</span>
    </div>

    <div class="hero-content">
      <div class="hero-icon" aria-hidden="true">🤟</div>
      <h1 class="hero-title">손으로 말해요!</h1>
      <p class="hero-subtitle">수어로 친구들에게 마음을 전해봐요 💝</p>
    </div>
  </header>

  <!-- ===== Word Selection ===== -->
  <main class="main-content">
    <div class="section-header">
      <h2>어떤 단어를 배울까요?</h2>
      <p>배우고 싶은 단어를 골라보세요!</p>
    </div>

    <div class="words-grid">

      <a href="learn.html?word=hello" class="word-card" data-color="blue">
        <div class="card-emoji" aria-hidden="true">👋</div>
        <span class="word-kr">안녕</span>
        <span class="word-en">Hello</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=thankyou" class="word-card" data-color="pink">
        <div class="card-emoji" aria-hidden="true">🙏</div>
        <span class="word-kr">고마워</span>
        <span class="word-en">Thank You</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=iloveyou" class="word-card" data-color="red">
        <div class="card-emoji" aria-hidden="true">🤟</div>
        <span class="word-kr">사랑해</span>
        <span class="word-en">I Love You</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=friend" class="word-card" data-color="green">
        <div class="card-emoji" aria-hidden="true">🤝</div>
        <span class="word-kr">친구</span>
        <span class="word-en">Friend</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=happy" class="word-card" data-color="yellow">
        <div class="card-emoji" aria-hidden="true">😊</div>
        <span class="word-kr">행복</span>
        <span class="word-en">Happy</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

    </div>
  </main>

  <footer class="home-footer">
    <p>🌸 어린이날 기념 수어 프로젝트 🌸</p>
  </footer>

</body>
</html>
