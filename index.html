<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손으로 말해요! 🤟</title>
  <link rel="stylesheet" href="css/style.css?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body class="home-page">

  <!-- Soft background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <div class="hero-floats" aria-hidden="true">
      <span class="fe hero-emoji emoji-hello" style="--x:12%; --y:30%; --d:0.0s; --dur:3.4s">👋</span>
      <span class="fe hero-emoji emoji-thanks" style="--x:33%; --y:20%; --d:0.5s; --dur:3.0s">🙏</span>
      <span class="fe hero-emoji emoji-love" style="--x:66%; --y:19%; --d:0.9s; --dur:3.2s">🤟</span>
      <span class="fe hero-emoji emoji-friend" style="--x:84%; --y:35%; --d:0.2s; --dur:3.6s">🧑‍🤝‍🧑</span>
      <span class="fe hero-emoji emoji-happy" style="--x:23%; --y:68%; --d:1.1s; --dur:3.1s">😊</span>
      <span class="fe hero-emoji emoji-star" style="--x:76%; --y:70%; --d:0.7s; --dur:3.5s">✨</span>
    </div>

    <div class="hero-content">
      <h1 class="hero-title">
        <span>EQUAL</span>
        <span>SIGN</span>
      </h1>
      <p class="hero-subtitle">손짓으로 전하는 즐거운 이야기</p>
    </div>
  </header>

  <!-- ===== Word Selection ===== -->
  <main class="main-content">
    <div class="section-header">
      <h2>어떤 손짓을 배워볼까요?</h2>
    </div>

    <div class="words-grid">

      <a href="learn.html?word=hello" class="word-card" data-color="blue">
        <div class="card-emoji" aria-hidden="true">👋</div>
        <span class="word-kr">안녕</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=thankyou" class="word-card" data-color="pink">
        <div class="card-emoji" aria-hidden="true">🙏</div>
        <span class="word-kr">고마워</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=iloveyou" class="word-card" data-color="red">
        <div class="card-emoji" aria-hidden="true">🤟</div>
        <span class="word-kr">사랑해</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=friend" class="word-card" data-color="green">
        <div class="card-emoji" aria-hidden="true">🧑‍🤝‍🧑</div>
        <span class="word-kr">친구</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

      <a href="learn.html?word=happy" class="word-card" data-color="yellow">
        <div class="card-emoji" aria-hidden="true">😊</div>
        <span class="word-kr">행복</span>
        <span class="card-btn">배워볼까요? →</span>
      </a>

    </div>
  </main>

  <footer class="home-footer">
    <p>🌸 어린이날 기념 수어 프로젝트 🌸</p>
  </footer>

</body>
</html>
